name: Release Builds

on:
  release:
    types: [created]

env:
  VULTR_REGISTRY: sjc.vultrcr.com
  VULTR_IMAGE_NAME: seven/bird-lg
  GHCR_IMAGE_NAME: realsunyz/bird-lg

jobs:
  build-client-binary:
    name: Build Client Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod

      - name: Build Client
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd client
          go build -ldflags="-s -w" -o bird-lg-client-linux-${{ matrix.goarch }} .

      - name: Upload Client Binary
        uses: softprops/action-gh-release@v1
        with:
          files: client/bird-lg-client-*

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login in to Vultr Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.VULTR_REGISTRY }}
          username: ${{ secrets.VULTR_USERNAME }}
          password: ${{ secrets.VULTR_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build - Frontend
        id: frontend
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:frontend"
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-${{ github.event.release.tag_name }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-${{ github.event.release.tag_name }}

      - name: Generate Artifact Attestation - Frontend
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}
          subject-digest: ${{ steps.frontend.outputs.digest }}
          push-to-registry: true

      - name: Build - Client
        id: client
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:client"
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-${{ github.event.release.tag_name }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-${{ github.event.release.tag_name }}

      - name: Generate Artifact Attestation - Client
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}
          subject-digest: ${{ steps.client.outputs.digest }}
          push-to-registry: true
