name: Release Builds

on:
  release:
    types: [created]

env:
  VULTR_REGISTRY: sjc.vultrcr.com
  VULTR_IMAGE_NAME: seven/bird-lg
  GHCR_IMAGE_NAME: realsunyz/bird-lg

jobs:
  build-client-binary:
    name: Build Client Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/client/go.mod
          cache-dependency-path: apps/client/go.sum

      - name: Build Client
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd apps/client
          go build -ldflags="-s -w -X bird-lg-client/internal/buildinfo.Version=${{ github.event.release.tag_name }} -X bird-lg-client/internal/buildinfo.Build=${{ github.sha }}" -o bird-lg-client-linux-${{ matrix.goarch }} .

      - name: Upload Client Binary
        uses: softprops/action-gh-release@v1
        with:
          files: apps/client/bird-lg-client-*

  build-docker-arch:
    name: Build Docker Image
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - goarch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login in to Vultr Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.VULTR_REGISTRY }}
          username: ${{ secrets.VULTR_USERNAME }}
          password: ${{ secrets.VULTR_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build - Frontend
        id: frontend
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}"
          file: deployments/server.Dockerfile
          build-args: |
            APP_VERSION=${{ github.event.release.tag_name }}
            APP_BUILD=${{ github.sha }}
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=frontend-${{ matrix.goarch }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.goarch }}
          tags: |
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-${{ matrix.goarch }}
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-${{ github.event.release.tag_name }}-${{ matrix.goarch }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-${{ matrix.goarch }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-${{ github.event.release.tag_name }}-${{ matrix.goarch }}

      - name: Generate Artifact Attestation - Frontend
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}
          subject-digest: ${{ steps.frontend.outputs.digest }}
          push-to-registry: true

      - name: Build - Client
        id: client
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}"
          file: deployments/client.Dockerfile
          build-args: |
            APP_VERSION=${{ github.event.release.tag_name }}
            APP_BUILD=${{ github.sha }}
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=client-${{ matrix.goarch }}
          cache-to: type=gha,mode=max,scope=client-${{ matrix.goarch }}
          tags: |
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-${{ matrix.goarch }}
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-${{ github.event.release.tag_name }}-${{ matrix.goarch }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-${{ matrix.goarch }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-${{ github.event.release.tag_name }}-${{ matrix.goarch }}

      - name: Generate Artifact Attestation - Client
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}
          subject-digest: ${{ steps.client.outputs.digest }}
          push-to-registry: true

  merge-docker-manifests:
    name: Merge Docker Manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - build-docker-arch
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login in to Vultr Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.VULTR_REGISTRY }}
          username: ${{ secrets.VULTR_USERNAME }}
          password: ${{ secrets.VULTR_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge - Frontend
        run: |
          docker buildx imagetools create \
            -t ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend \
            -t ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-${{ github.event.release.tag_name }} \
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-amd64 \
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-arm64

          docker buildx imagetools create \
            -t ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend \
            -t ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-${{ github.event.release.tag_name }} \
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-amd64 \
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-arm64

      - name: Merge - Client
        run: |
          docker buildx imagetools create \
            -t ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client \
            -t ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-${{ github.event.release.tag_name }} \
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-amd64 \
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-arm64

          docker buildx imagetools create \
            -t ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client \
            -t ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-${{ github.event.release.tag_name }} \
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-amd64 \
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-arm64
