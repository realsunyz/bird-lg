name: Development Builds

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

env:
  VULTR_REGISTRY: sjc.vultrcr.com
  VULTR_IMAGE_NAME: seven/bird-lg
  GHCR_IMAGE_NAME: realsunyz/bird-lg

jobs:
  changes:
    name: Check Code Changes
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            client:
              - 'client/**'

  build-client-binary:
    name: Build Client Binary
    runs-on: ubuntu-latest
    needs:
      - changes
    if: always() && github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.client == 'true')
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod

      - name: Build Client
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd client
          go build -ldflags="-s -w" -o bird-lg-client-linux-${{ matrix.goarch }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bird-lg-client-linux-${{ matrix.goarch }}
          path: client/bird-lg-client-*

  build-docker-arch:
    name: Build Docker Image
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs:
      - changes
    if: always() && github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.client == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - goarch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login in to Vultr Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.VULTR_REGISTRY }}
          username: ${{ secrets.VULTR_USERNAME }}
          password: ${{ secrets.VULTR_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build - Frontend
        id: frontend
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:frontend"
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=frontend-${{ matrix.goarch }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.goarch }}
          tags: |
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-dev-${{ matrix.goarch }}
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-dev-${{ github.sha }}-${{ matrix.goarch }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-dev-${{ matrix.goarch }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-dev-${{ github.sha }}-${{ matrix.goarch }}

      - name: Generate Artifact Attestation - Frontend
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}
          subject-digest: ${{ steps.frontend.outputs.digest }}
          push-to-registry: true

      - name: Build - Client
        id: client
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.client == 'true'
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:client"
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=client-${{ matrix.goarch }}
          cache-to: type=gha,mode=max,scope=client-${{ matrix.goarch }}
          tags: |
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-dev-${{ matrix.goarch }}
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-dev-${{ github.sha }}-${{ matrix.goarch }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-dev-${{ matrix.goarch }}
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-dev-${{ github.sha }}-${{ matrix.goarch }}

      - name: Generate Artifact Attestation - Client
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.client == 'true'
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}
          subject-digest: ${{ steps.client.outputs.digest }}
          push-to-registry: true

  merge-docker-manifests:
    name: Merge Docker Manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - changes
      - build-docker-arch
    if: always() && github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.client == 'true')
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login in to Vultr Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.VULTR_REGISTRY }}
          username: ${{ secrets.VULTR_USERNAME }}
          password: ${{ secrets.VULTR_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge - Frontend
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
        run: |
          docker buildx imagetools create \
            -t ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-dev \
            -t ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-dev-${{ github.sha }} \
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-dev-amd64 \
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:frontend-dev-arm64

          docker buildx imagetools create \
            -t ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-dev \
            -t ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-dev-${{ github.sha }} \
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-dev-amd64 \
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:frontend-dev-arm64

      - name: Merge - Client
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.client == 'true'
        run: |
          docker buildx imagetools create \
            -t ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-dev \
            -t ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-dev-${{ github.sha }} \
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-dev-amd64 \
            ${{ env.VULTR_REGISTRY }}/${{ env.VULTR_IMAGE_NAME }}:client-dev-arm64

          docker buildx imagetools create \
            -t ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-dev \
            -t ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-dev-${{ github.sha }} \
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-dev-amd64 \
            ghcr.io/${{ env.GHCR_IMAGE_NAME }}:client-dev-arm64
