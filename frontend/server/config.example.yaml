# BIRD Looking Glass Server Configuration
# Environment variables override these settings

# Server listen address
listen: ":3000"

# Static files directory (Next.js export output)
static_dir: "./static"

# Cloudflare Turnstile configuration
# Leave empty to disable CAPTCHA verification
turnstile:
  site_key: ""
  secret_key: ""

# JWT configuration for session tokens
jwt:
  secret: "" # Set in production! Tokens expire in 5 minutes

# HMAC secret for signing requests to client nodes
hmac:
  secret: ""

# Application branding
app:
  title: "BIRD Looking Glass"
  subtitle: "Select a server to continue"

# Server nodes configuration
# Each server connects to a bird-lg-client instance
servers:
  - id: tokyo
    name: Tokyo
    location: Tokyo, Japan
    endpoint: http://localhost:18000
    icon: "🇯🇵"

  # - id: frankfurt
  #   name: Frankfurt
  #   location: Frankfurt, Germany
  #   endpoint: http://frankfurt.example.com:18000
  #   icon: "🇩🇪"
